<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IdeaVault — Geschäftsideen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --card: #1a1a1f;
    --border: #2a2a32;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --accent3: #ff6b47;
    --text: #f0f0f5;
    --muted: #6b6b7a;
    --roi-color: #e8ff47;
    --mach-color: #47c8ff;
    --skal-color: #b847ff;
    --grid-line: rgba(232,255,71,0.03);
    --shadow: rgba(0,0,0,0.4);
    --card-hover-border: #3a3a45;
  }

  :root.light {
    --bg: #f4f4f0;
    --surface: #eaeae4;
    --card: #ffffff;
    --border: #d8d8cc;
    --accent: #8aaa00;
    --accent2: #0088bb;
    --accent3: #cc3300;
    --text: #1a1a1f;
    --muted: #888880;
    --roi-color: #8aaa00;
    --mach-color: #0088bb;
    --skal-color: #8800cc;
    --grid-line: rgba(0,0,0,0.04);
    --shadow: rgba(0,0,0,0.12);
    --card-hover-border: #bbbbaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 56px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo-block { display: flex; flex-direction: column; gap: 4px; }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    text-align: right;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ADD BUTTON */
  .btn-add {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }
  .btn-add:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(232,255,71,0.3);
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.05);
  }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    outline: none;
    margin-left: auto;
    width: 200px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* SORT */
  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    cursor: pointer;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sort-select:focus { border-color: var(--accent); }

  /* GRID */
  .ideas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* CARD */
  .idea-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.3s ease;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%);
  }
  .idea-card:hover {
    transform: translateY(-3px);
    border-color: var(--card-hover-border);
    box-shadow: 0 12px 40px var(--shadow);
  }

  .card-corner {
    position: absolute;
    top: 0; right: 0;
    width: 16px; height: 16px;
    background: var(--accent);
    clip-path: polygon(0 0, 100% 100%, 100% 0);
    opacity: 0.6;
  }

  /* STATUS BADGE */
  .status-badge {
    display: inline-block;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .status-new    { background: rgba(232,255,71,0.12); color: var(--accent); border: 1px solid rgba(232,255,71,0.3); }
  .status-review { background: rgba(71,200,255,0.12); color: var(--accent2); border: 1px solid rgba(71,200,255,0.3); }
  .status-active { background: rgba(71,200,71,0.12); color: #7fff47; border: 1px solid rgba(71,200,71,0.3); }
  .status-pause  { background: rgba(255,107,71,0.12); color: var(--accent3); border: 1px solid rgba(255,107,71,0.3); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1.2;
    margin-bottom: 8px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .card-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
    min-height: 36px;
  }

  /* METRICS */
  .metrics {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .metric-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .metric-key {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    width: 80px;
    flex-shrink: 0;
    color: var(--muted);
  }

  .metric-bar-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    position: relative;
    overflow: visible;
  }

  .metric-bar-fill {
    height: 100%;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .metric-bar-fill::after {
    content: '';
    position: absolute;
    right: -1px; top: -3px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: inherit;
  }

  .roi-bar  { background: var(--roi-color); box-shadow: 0 0 8px rgba(232,255,71,0.4); }
  .mach-bar { background: var(--mach-color); box-shadow: 0 0 8px rgba(71,200,255,0.4); }
  .skal-bar { background: var(--skal-color); box-shadow: 0 0 8px rgba(184,71,255,0.4); }

  .metric-val {
    font-size: 11px;
    font-weight: 500;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .roi-val  { color: var(--roi-color); }
  .mach-val { color: var(--mach-color); }
  .skal-val { color: var(--skal-color); }

  /* SCORE */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .score-block { display: flex; flex-direction: column; }
  .score-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    line-height: 1;
  }
  .score-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .card-date {
    font-size: 10px;
    color: var(--muted);
    font-style: italic;
  }

  .card-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px; height: 30px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.delete:hover { border-color: var(--accent3); color: var(--accent3); }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 8px;
    opacity: 0.5;
  }
  .empty-text { font-size: 12px; opacity: 0.5; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 540px;
    padding: 36px;
    position: relative;
    animation: slideUp 0.25s ease;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 0 100%);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-corner {
    position: absolute;
    top: 0; right: 0;
    width: 20px; height: 20px;
    background: var(--accent);
    clip-path: polygon(0 0, 100% 100%, 100% 0);
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 28px;
    letter-spacing: -0.02em;
  }
  .modal-title span { color: var(--accent); }

  .field {
    margin-bottom: 20px;
  }
  .field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field textarea { min-height: 80px; }

  /* SLIDER */
  .slider-group {
    display: flex; align-items: center; gap: 12px;
  }
  .slider-group input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    background: transparent;
    padding: 0;
    border: none;
    height: 4px;
    cursor: pointer;
  }
  .slider-group input[type=range]::-webkit-slider-runnable-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }
  .slider-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    margin-top: -6px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .slider-group input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.2); }

  #roi-slider::-webkit-slider-thumb    { background: var(--roi-color); box-shadow: 0 0 6px rgba(232,255,71,0.6); }
  #mach-slider::-webkit-slider-thumb   { background: var(--mach-color); box-shadow: 0 0 6px rgba(71,200,255,0.6); }
  #skal-slider::-webkit-slider-thumb   { background: var(--skal-color); box-shadow: 0 0 6px rgba(184,71,255,0.6); }

  .slider-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    width: 28px;
    text-align: right;
  }
  .roi-color  { color: var(--roi-color); }
  .mach-color { color: var(--mach-color); }
  .skal-color { color: var(--skal-color); }

  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .btn-save {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 12px 28px;
    cursor: pointer;
    flex: 1;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-save:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232,255,71,0.3);
  }

  .btn-cancel {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 12px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--accent3); color: var(--accent3); }

  /* DETAIL MODAL */
  .detail-section {
    margin-bottom: 20px;
  }
  .detail-key {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted); margin-bottom: 4px;
  }
  .detail-val {
    font-size: 14px; color: var(--text); line-height: 1.6;
  }

  .notes-area {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px;
    outline: none;
    min-height: 100px;
    resize: vertical;
    margin-top: 4px;
  }
  .notes-area:focus { border-color: var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* THEME TOGGLE */
  .btn-theme {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    width: 36px; height: 36px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-theme:hover { border-color: var(--accent); color: var(--accent); }

  /* EXPORT DROPDOWN */
  .export-wrap {
    position: relative;
    display: inline-block;
  }
  .btn-export {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0 14px;
    height: 36px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .btn-export:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-export .arrow { font-size: 9px; transition: transform 0.15s; }
  .export-wrap.open .btn-export .arrow { transform: rotate(180deg); }

  .export-menu {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    min-width: 160px;
    z-index: 50;
    box-shadow: 0 8px 24px var(--shadow);
  }
  .export-wrap.open .export-menu { display: block; }

  .export-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: all 0.1s;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
  }
  .export-item:hover { background: rgba(71,200,255,0.06); color: var(--accent2); }
  .export-item .icon { font-size: 14px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 12px 20px;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* LIGHT MODE SLIDER ADJUSTMENTS */
  :root.light .slider-group input[type=range]::-webkit-slider-runnable-track {
    background: var(--border);
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo-block">
      <div class="logo">Idea<span>Vault</span></div>
      <div class="tagline">Braindump · Bewerten · Entscheiden</div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-label">Ideen</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="avg-score" style="color: var(--accent2)">—</div>
        <div class="stat-label">Ø Score</div>
      </div>
      <button class="btn-theme" id="theme-btn" onclick="toggleTheme()" title="Dark/Light Mode">🌙</button>
      <div class="export-wrap" id="export-wrap">
        <button class="btn-export" onclick="toggleExport()">↓ Export <span class="arrow">▾</span></button>
        <div class="export-menu">
          <button class="export-item" onclick="exportJSON()"><span class="icon">{ }</span> JSON</button>
          <button class="export-item" onclick="exportCSV()"><span class="icon">⊞</span> CSV / Excel</button>
        </div>
      </div>
      <button class="btn-add" onclick="openAdd()">+ Neue Idee</button>
    </div>
  </header>

  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="setFilter('all', this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('new', this)">Neu</button>
    <button class="filter-btn" onclick="setFilter('review', this)">In Prüfung</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Aktiv</button>
    <button class="filter-btn" onclick="setFilter('pause', this)">Pausiert</button>
    <select class="sort-select" onchange="setSort(this.value)">
      <option value="date-desc">Neueste zuerst</option>
      <option value="date-asc">Älteste zuerst</option>
      <option value="score-desc">Bester Score</option>
      <option value="roi-desc">Höchster ROI</option>
    </select>
    <input class="search-input" type="text" placeholder="Suchen..." oninput="setSearch(this.value)">
  </div>

  <div class="ideas-grid" id="grid"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-corner"></div>
    <div class="modal-title" id="modal-title">Neue <span>Idee</span></div>

    <div class="field">
      <label>Titel *</label>
      <input type="text" id="f-title" placeholder="z.B. Waschmaschinen Salon">
    </div>

    <div class="field">
      <label>Kurzbeschreibung</label>
      <textarea id="f-desc" placeholder="Was ist die Idee? Wer ist die Zielgruppe?"></textarea>
    </div>

    <div class="field">
      <label>ROI-Potenzial <span class="roi-color">/ 10</span></label>
      <div class="slider-group">
        <input type="range" id="roi-slider" min="1" max="10" value="5" oninput="document.getElementById('roi-val').textContent=this.value">
        <span class="slider-val roi-color" id="roi-val">5</span>
      </div>
    </div>

    <div class="field">
      <label>Machbarkeit <span class="mach-color">/ 10</span></label>
      <div class="slider-group">
        <input type="range" id="mach-slider" min="1" max="10" value="5" oninput="document.getElementById('mach-val').textContent=this.value">
        <span class="slider-val mach-color" id="mach-val">5</span>
      </div>
    </div>

    <div class="field">
      <label>Skalierbarkeit <span class="skal-color">/ 10</span></label>
      <div class="slider-group">
        <input type="range" id="skal-slider" min="1" max="10" value="5" oninput="document.getElementById('skal-val').textContent=this.value">
        <span class="slider-val skal-color" id="skal-val">5</span>
      </div>
    </div>

    <div class="field">
      <label>Status</label>
      <select id="f-status">
        <option value="new">Neu (Braindump)</option>
        <option value="review">In Prüfung</option>
        <option value="active">Aktiv verfolgt</option>
        <option value="pause">Pausiert</option>
      </select>
    </div>

    <div class="field">
      <label>Notizen / Nächste Schritte</label>
      <textarea id="f-notes" placeholder="Erste Gedanken, Quellen, To-dos..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveIdea()">Speichern →</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:600px">
    <div class="modal-corner"></div>
    <div id="detail-content"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDetail()">Schließen</button>
      <button class="btn-save" id="detail-edit-btn">Bearbeiten →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'ideavault_v1';
let ideas = [];
let editId = null;
let filterStatus = 'all';
let sortMode = 'date-desc';
let searchQ = '';

function load() {
  try {
    ideas = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch { ideas = []; }
  render();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
  render();
}

function scoreColor(s) {
  if (s >= 8) return '#7fff47';
  if (s >= 6) return '#e8ff47';
  if (s >= 4) return '#47c8ff';
  return '#ff6b47';
}

function statusLabel(s) {
  return { new: 'Neu', review: 'In Prüfung', active: 'Aktiv', pause: 'Pausiert' }[s] || 'Neu';
}

function fmt(d) {
  return new Date(d).toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: '2-digit' });
}

function filtered() {
  let list = [...ideas];
  if (filterStatus !== 'all') list = list.filter(i => i.status === filterStatus);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(i => i.title.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
  }
  list.sort((a, b) => {
    if (sortMode === 'date-asc')   return a.created - b.created;
    if (sortMode === 'score-desc') return b.score - a.score;
    if (sortMode === 'roi-desc')   return b.roi - a.roi;
    return b.created - a.created;
  });
  return list;
}

function render() {
  const grid = document.getElementById('grid');
  const list = filtered();

  document.getElementById('total-count').textContent = ideas.length;
  const avg = ideas.length ? (ideas.reduce((s, i) => s + i.score, 0) / ideas.length).toFixed(1) : '—';
  document.getElementById('avg-score').textContent = avg;

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">💡</div>
      <div class="empty-title">${ideas.length ? 'Keine Treffer' : 'Noch keine Ideen'}</div>
      <div class="empty-text">${ideas.length ? 'Filter anpassen.' : 'Klick auf "+ Neue Idee" um deinen ersten Braindump zu starten.'}</div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(idea => `
    <div class="idea-card" onclick="openDetail('${idea.id}')">
      <div class="card-corner"></div>
      <div>
        <span class="status-badge status-${idea.status}">${statusLabel(idea.status)}</span>
      </div>
      <div class="card-title">${escHtml(idea.title)}</div>
      <div class="card-desc">${idea.desc ? escHtml(idea.desc.slice(0, 100)) + (idea.desc.length > 100 ? '…' : '') : '<i>Keine Beschreibung</i>'}</div>
      <div class="metrics">
        <div class="metric-row">
          <span class="metric-key">ROI</span>
          <div class="metric-bar-track">
            <div class="metric-bar-fill roi-bar" style="width:${idea.roi*10}%"></div>
          </div>
          <span class="metric-val roi-val">${idea.roi}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Machbarkeit</span>
          <div class="metric-bar-track">
            <div class="metric-bar-fill mach-bar" style="width:${idea.mach*10}%"></div>
          </div>
          <span class="metric-val mach-val">${idea.mach}</span>
        </div>
        <div class="metric-row">
          <span class="metric-key">Skalierbar</span>
          <div class="metric-bar-track">
            <div class="metric-bar-fill skal-bar" style="width:${idea.skal*10}%"></div>
          </div>
          <span class="metric-val skal-val">${idea.skal}</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="score-block">
          <span class="score-num" style="color:${scoreColor(idea.score)}">${idea.score.toFixed(1)}</span>
          <span class="score-label">Gesamtscore</span>
        </div>
        <span class="card-date">${fmt(idea.created)}</span>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="openEdit('${idea.id}')" title="Bearbeiten">✎</button>
          <button class="btn-icon delete" onclick="deleteIdea('${idea.id}')" title="Löschen">✕</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openAdd() {
  editId = null;
  document.getElementById('modal-title').innerHTML = 'Neue <span>Idee</span>';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('roi-slider').value = 5;
  document.getElementById('mach-slider').value = 5;
  document.getElementById('skal-slider').value = 5;
  document.getElementById('roi-val').textContent = 5;
  document.getElementById('mach-val').textContent = 5;
  document.getElementById('skal-val').textContent = 5;
  document.getElementById('f-status').value = 'new';
  document.getElementById('f-notes').value = '';
  document.getElementById('modal').classList.add('open');
}

function openEdit(id) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;
  editId = id;
  document.getElementById('modal-title').innerHTML = 'Idee <span>bearbeiten</span>';
  document.getElementById('f-title').value = idea.title;
  document.getElementById('f-desc').value = idea.desc;
  document.getElementById('roi-slider').value = idea.roi;
  document.getElementById('mach-slider').value = idea.mach;
  document.getElementById('skal-slider').value = idea.skal;
  document.getElementById('roi-val').textContent = idea.roi;
  document.getElementById('mach-val').textContent = idea.mach;
  document.getElementById('skal-val').textContent = idea.skal;
  document.getElementById('f-status').value = idea.status;
  document.getElementById('f-notes').value = idea.notes || '';
  closeDetail();
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function saveIdea() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor = 'var(--accent3)'; return; }
  document.getElementById('f-title').style.borderColor = '';

  const roi  = +document.getElementById('roi-slider').value;
  const mach = +document.getElementById('mach-slider').value;
  const skal = +document.getElementById('skal-slider').value;
  const score = (roi + mach + skal) / 3;

  const data = {
    title,
    desc:   document.getElementById('f-desc').value.trim(),
    roi, mach, skal, score,
    status: document.getElementById('f-status').value,
    notes:  document.getElementById('f-notes').value.trim(),
  };

  if (editId) {
    const idx = ideas.findIndex(i => i.id === editId);
    if (idx !== -1) ideas[idx] = { ...ideas[idx], ...data };
  } else {
    ideas.unshift({ ...data, id: Date.now().toString(), created: Date.now() });
  }

  closeModal();
  save();
}

function deleteIdea(id) {
  if (!confirm('Idee wirklich löschen?')) return;
  ideas = ideas.filter(i => i.id !== id);
  save();
}

function openDetail(id) {
  const idea = ideas.find(i => i.id === id);
  if (!idea) return;

  document.getElementById('detail-content').innerHTML = `
    <div style="margin-bottom:24px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap;">
      <div>
        <span class="status-badge status-${idea.status}" style="margin-bottom:8px; display:inline-block">${statusLabel(idea.status)}</span>
        <div class="modal-title" style="margin-bottom:0">${escHtml(idea.title)}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:36px;color:${scoreColor(idea.score)};line-height:1">${idea.score.toFixed(1)}</div>
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Gesamtscore</div>
      </div>
    </div>

    ${idea.desc ? `<div class="detail-section">
      <div class="detail-key">Beschreibung</div>
      <div class="detail-val">${escHtml(idea.desc)}</div>
    </div>` : ''}

    <div class="detail-section">
      <div class="detail-key">Metriken</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:8px">
        <div style="background:var(--surface);padding:14px;border:1px solid var(--border)">
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:4px">ROI</div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--roi-color);line-height:1">${idea.roi}<span style="font-size:14px;opacity:0.5">/10</span></div>
        </div>
        <div style="background:var(--surface);padding:14px;border:1px solid var(--border)">
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:4px">Machbarkeit</div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--mach-color);line-height:1">${idea.mach}<span style="font-size:14px;opacity:0.5">/10</span></div>
        </div>
        <div style="background:var(--surface);padding:14px;border:1px solid var(--border)">
          <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:4px">Skalierbar</div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--skal-color);line-height:1">${idea.skal}<span style="font-size:14px;opacity:0.5">/10</span></div>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-key">Notizen & Nächste Schritte</div>
      <div class="detail-val" style="white-space:pre-wrap;margin-top:4px;padding:12px;background:var(--surface);border:1px solid var(--border);min-height:60px;font-size:12px">${idea.notes ? escHtml(idea.notes) : '<span style="color:var(--muted);font-style:italic">Noch keine Notizen.</span>'}</div>
    </div>

    <div style="font-size:10px;color:var(--muted);margin-top:4px">Erstellt: ${fmt(idea.created)}</div>
  `;

  document.getElementById('detail-edit-btn').onclick = () => openEdit(idea.id);
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-modal').classList.remove('open');
}

function setFilter(f, btn) {
  filterStatus = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setSort(v) {
  sortMode = v;
  render();
}

function setSearch(v) {
  searchQ = v;
  render();
}

// Close modals on overlay click
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('detail-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

// Close export dropdown on outside click
document.addEventListener('click', e => {
  const wrap = document.getElementById('export-wrap');
  if (!wrap.contains(e.target)) wrap.classList.remove('open');
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeDetail(); }
  if (e.key === 'n' && !['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) openAdd();
});

// THEME
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('ideavault_theme', isLight ? 'light' : 'dark');
}
function loadTheme() {
  const t = localStorage.getItem('ideavault_theme');
  if (t === 'light') {
    document.documentElement.classList.add('light');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}

// EXPORT
function toggleExport() {
  document.getElementById('export-wrap').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportJSON() {
  document.getElementById('export-wrap').classList.remove('open');
  const clean = ideas.map(({ id, title, desc, roi, mach, skal, score, status, notes, created }) => ({
    id, title, beschreibung: desc, roi, machbarkeit: mach, skalierbarkeit: skal,
    gesamtscore: +score.toFixed(2), status, notizen: notes,
    erstellt: new Date(created).toISOString().slice(0,10)
  }));
  const blob = new Blob([JSON.stringify(clean, null, 2)], { type: 'application/json' });
  dlBlob(blob, `ideavault_${today()}.json`);
  showToast('✓ JSON exportiert');
}

function exportCSV() {
  document.getElementById('export-wrap').classList.remove('open');
  const headers = ['Titel','Beschreibung','ROI','Machbarkeit','Skalierbarkeit','Gesamtscore','Status','Notizen','Erstellt'];
  const statusMap = { new: 'Neu', review: 'In Prüfung', active: 'Aktiv', pause: 'Pausiert' };
  const rows = ideas.map(i => [
    i.title, i.desc, i.roi, i.mach, i.skal, i.score.toFixed(2),
    statusMap[i.status] || i.status, i.notes,
    new Date(i.created).toLocaleDateString('de-DE')
  ].map(v => `"${String(v ?? '').replace(/"/g, '""')}"`));
  const csv = [headers.join(';'), ...rows.map(r => r.join(';'))].join('\n');
  // Add BOM for Excel UTF-8 compatibility
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  dlBlob(blob, `ideavault_${today()}.csv`);
  showToast('✓ CSV exportiert — direkt in Excel öffenbar');
}

function dlBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function today() {
  return new Date().toISOString().slice(0,10);
}

// SEED DATA
function seed() {
  if (ideas.length) return;
  ideas = [
    {
      id: '1', title: 'Waschmaschinen Salon', created: Date.now() - 86400000 * 3,
      desc: 'Premium Self-Service Laundromat mit Café-Atmosphäre in urbanen Vierteln. Zielgruppe: Singles, Studenten ohne eigene Waschmaschine.',
      roi: 6, mach: 8, skal: 5, score: 6.3, status: 'review',
      notes: '– Marktrecherche Standorte Berlin Mitte\n– Wettbewerber: Miele Waschsalon\n– Startkapital ca. 80k€'
    },
    {
      id: '2', title: 'B2B SaaS für Handwerker', created: Date.now() - 86400000 * 7,
      desc: 'Einfache Auftrags- und Rechnungssoftware speziell für Handwerksbetriebe bis 10 MA. Mobile-first.',
      roi: 8, mach: 6, skal: 9, score: 7.7, status: 'active',
      notes: 'MVP in 3 Monaten realisierbar. Pricing: 49€/Monat.'
    },
    {
      id: '3', title: 'KI Beratung für KMU', created: Date.now() - 86400000 * 1,
      desc: 'Consulting-Angebot: KI-Readiness Assessment + Implementierungsbegleitung für mittelständische Unternehmen.',
      roi: 9, mach: 9, skal: 7, score: 8.3, status: 'new',
      notes: ''
    }
  ];
}

seed();
loadTheme();
load();
</script>
</body>
</html>
